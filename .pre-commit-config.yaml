# Pre-commit configuration for MCP Python Analyzer
# See https://pre-commit.com for more information

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements

  # Python-specific checks with RUFF
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      # Linter
      - id: ruff
        args: [--fix]
      # Formatter
      - id: ruff-format

  # Type checking with ty
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check --no-progress --output-format=concise
        language: system
        types_or: [python, pyi]
        files: ^(src|tests)/.*\.py$

  # Pyupgrade for python version itself
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py313-plus]

  # JavaScript/TypeScript linting and formatting with Biome (requires: npm ci)
  - repo: local
    hooks:
      - id: biome
        name: biome check (JS/TS)
        entry: npx --no-install biome check --write
        language: system
        types_or: [javascript, jsx, ts, tsx, json]
        pass_filenames: true
        require_serial: true

  # Release policy checks with repo-release-tools
  - repo: https://github.com/Anselmoo/repo-release-tools
    rev: v1.9.0
    hooks:
      - id: rrt-branch-name
      - id: rrt-commit-subject

# Configuration for specific tools
default_language_version:
  python: python3.13

default_stages: [pre-commit]

# Speed up by focusing on source files only
exclude: ^(\.venv/|\.git/|__pycache__/|examples/)
